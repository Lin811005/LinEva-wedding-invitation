<!DOCTYPE html>
<html lang="zh-Hant-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lin & Eva Wedding Invitation</title>
    <!-- 樣式表 -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="images/favicon.ico">
</head>

<body>

    <!-- 第一個區塊 -->
    <div class="mobile-only-box">
        
        <img src="images/block_1_bg.jpg" alt="手機版廣告圖 2">
        
        <div class="overlay-img kv-fade-normal">
            <img src="images/block_1_text.png" alt="疊在上面的圖">
        </div>

    </div>  

     <!-- 第二個區塊 -->
    <div class="mobile-only-box">
        
        <img src="images/block_2_bg.jpg" alt="手機版廣告圖 2">
       
        <div class="overlay-img kv-fade-normal">
            <img src="images/block_2_special.png" alt="疊在上面的圖">
        </div>

        <div class="overlay-img kv-fade-in">
            <img src="images/block_2_picture.png" alt="疊在上面的圖">

        <div class="overlay-img kv-fade-in">

        <div class="overlay-img kv-fade-in">
            <img src="images/block_2_text_2.png" alt="疊在上面的圖">
        </div>

        <div class="overlay-img kv-fade-in">
            <!-- 💡 已精準定位「上海鄉村 承德本家」 -->
            <a href="https://google.com" target="_blank" rel="noopener noreferrer">
                <img src="images/block_2_CTA.png" alt="點擊行動按鈕">

    </div>

        <div class="overlay-img kv-fade-in">
            <img src="images/block_3_picture_2.png" alt="疊在上面的圖">
        </div>

        <div class="overlay-img kv-fade-in">
            <img src="images/block_3_text_1.png" alt="疊在上面的圖">
        </div>        

        <div class="overlay-img kv-fade-in">
            <img src="images/block_3_text_2.png" alt="疊在上面的圖">
        </div>

    </div>  

    <!-- 第四個區塊 -->
    <div class="mobile-only-box">
        
        <img src="images/block_4_bg.jpg" alt="手機版廣告圖 2">
        
        <div class="overlay-img kv-fade-in">
            <img src="images/block_4_picture_1.png" alt="疊在上面的圖">
        </div>

        <div class="overlay-img kv-fade-in">
            <img src="images/block_4_picture_2.png" alt="疊在上面的圖">
        </div>        

        <div class="overlay-img kv-fade-left">
            <img src="images/block_4_text.png" alt="疊在上面的圖">
        </div>

    </div>     

    <!-- 第五個區塊 -->
    <div class="mobile-only-box">
        
        <img src="images/block_5_bg.jpg" alt="手機版廣告圖 2">
        
        <div class="overlay-img kv-fade-in">
            <img src="images/block_5_picture_1.png" alt="疊在上面的圖">
        </div>

        <div class="overlay-img kv-fade-in">
            <img src="images/block_5_picture_2.png" alt="疊在上面的圖">
        </div>        

        <div class="overlay-img kv-fade-normal">
            <img src="images/block_5_text.png" alt="疊在上面的圖">
        </div>

    </div>  
    
    <!-- 第六個區塊 -->
    <div class="mobile-only-box">
        
        <img src="images/block_6_bg.jpg" alt="手機版廣告圖 2">

        <div class="overlay-img kv-fade-normal">
            <img src="images/block_6_seeusoon.png" alt="疊在上面的圖">
        </div>        
        
    </div> 


    <!-- 💡 【原生的背景音樂標籤】設定在後台完全隱藏，並開啟自動循環（loop） -->
    <audio id="bgm" src="images/ai_no_hana.mp3" loop style="position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none;"></audio>


    <!-- 1. jQuery 核心 -->
    <script src="https://jquery.com"
        integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>

    <!-- 2. jQuery Smoove 外掛 -->
    <script src="https://cloudflare.com"></script>

    <!-- 3. 自訂的獨立 JS 檔案 -->
    <script src="script/script.js"></script>
